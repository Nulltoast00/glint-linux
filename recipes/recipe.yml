# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: glint-linux 
description: Luv u Glint
image-version: rawhide
base-image: quay.io/fedora-ostree-desktops/kinoite

modules:
  - type: dnf
    install:
      packages:
        - wine-core
        - wine-common
        - gamemode         
        - powertop         
        - fastfetch        
        - NetworkManager-wifi
        - bluez
        - bluez-utils
        - pipewire-utils
        - openjdk21

  - type: files
    files:
      - usr
      - etc
