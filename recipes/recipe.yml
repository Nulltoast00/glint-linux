# yaml-language-server: $schema=https://blue-build.org
name: glint-linux 
description: Luv u Glint
image-version: 40

base-image: ghcr.io/fedora-linux/fedora-kinoite:rawhide

modules:
  - type: dnf
    install:
      packages: # obj
        - wine-core
        - wine-common
        - gamemode         
        - powertop         
        - fastfetch        
        - mesa-va-drivers  
        - intel-media-driver
        - NetworkManager-wifi
        - bluez
        - bluez-utils
        - pipewire-utils
        - openjdk21
        - openjdk21-fastload

  - type: flatpaks
    notify: true
    install:
      packages: # obj
        - org.mozilla.firefox
        - org.libreoffice.LibreOffice
        - com.valvesoftware.Steam
        - net.davidotek.pupgui2
        - net.lutris.Lutris
        - com.spotify.Client
        - us.zoom.Zoom

  - type: script
    scripts:
      - glint-setup.sh # <--- CALLS ALL YOUR INTEL AND SKLAUNCHER TWEAKS SECURELY!
