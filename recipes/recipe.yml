# yaml-language-server: $schema=https://blue-build.org
name: glint-linux 
description: Luv u Glint
image-version: 40

base-image: ghcr.io/fedora-linux/fedora-kinoite:rawhide

modules:
  - type: dnf
    install:
      packages:
        - wine-core
        - wine-common
        - gamemode         
        - powertop         
        - fastfetch        
        - mesa-va-drivers  
        - intel-media-driver
        - NetworkManager-wifi
        - bluez
        - bluez-utils
        - pipewire-utils
        - openjdk21
        - openjdk21-fastload

  - type: script
    scripts:
      - glint-setup.sh
